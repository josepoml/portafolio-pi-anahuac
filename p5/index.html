<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro de Datos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="registroForm">
            <h2>Formulario de Entrada</h2>
            
            <label>Texto: <input type="text" id="txtNombre"></label>
            <label>Email: <input type="email" id="txtEmail"></label>

            <fieldset>
                <legend>Opciones (Checkbox):</legend>
                <input type="checkbox" name="chkOpcion" value="A"> A
                <input type="checkbox" name="chkOpcion" value="B"> B
                <input type="checkbox" name="chkOpcion" value="C"> C
            </fieldset>

            <fieldset>
                <legend>Prioridad (Radio):</legend>
                <input type="radio" name="radNivel" value="Alta"> Alta
                <input type="radio" name="radNivel" value="Media"> Media
                <input type="radio" name="radNivel" value="Baja"> Baja
            </fieldset>

            <label>Fecha y Hora: <input type="datetime-local" id="dtFecha"></label>
            <label>Color: <input type="color" id="clrColor"></label>
            <label>Rango: <input type="range" id="rngNivel" min="0" max="100"></label>

            <button type="button" id="btnEnviar" onclick="procesarFormulario()">Registrar Información</button>
        </form>

        <div class="table-container">
            <table id="tablaDatos">
                <thead>
                    <tr>
                        <th>Texto</th>
                        <th>Email</th>
                        <th>Checks</th>
                        <th>Radio</th>
                        <th>Fecha</th>
                        <th>Color</th>
                        <th>Rango</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
